<!doctype html>
<html lang="en" style="color-scheme: light only; background-color: #f8fafc">
	<head>
		<meta charset="utf-8" />
		<meta name="color-scheme" content="light only" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="icon" href="%sveltekit.assets%/logo.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#964ac0" />
		<meta
			name="description"
			content="Clubhouse — organize 2v2 badminton club sessions, matches, and payments."
		/>
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="format-detection" content="telephone=no" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
