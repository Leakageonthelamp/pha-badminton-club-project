<!doctype html>
<html lang="en" style="color-scheme: light only; background-color: #f8fafc">
	<head>
		<meta charset="utf-8" />
		<script>
			document.documentElement.style.setProperty('color-scheme', 'light only');
			document.documentElement.style.backgroundColor = '#f8fafc';
		</script>
		<meta name="color-scheme" content="light" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="icon" href="%sveltekit.assets%/logo.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" sizes="512x512" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: dark)" />
		<meta name="description" content="Antonsmash admin panel." />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="format-detection" content="telephone=no" />
		<script>
			window.__pwaDeferredPrompt = null;
			window.addEventListener('beforeinstallprompt', function (event) {
				event.preventDefault();
				window.__pwaDeferredPrompt = event;
				window.dispatchEvent(new Event('pwa-deferred-prompt'));
			});
			window.addEventListener('appinstalled', function () {
				window.__pwaDeferredPrompt = null;
				window.dispatchEvent(new Event('pwa-installed'));
			});
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
