<!doctype html>
<html lang="%lang%">
	<head>
		<meta charset="utf-8" />
		<script>
			(function () {
				var KEY = 'ph:theme';
				var DARK_BG = '#0b1120';
				var LIGHT_BG = '#f8fafc';
				var pref = 'system';
				try {
					var v = localStorage.getItem(KEY);
					if (v === 'light' || v === 'dark' || v === 'system') pref = v;
				} catch (e) {}
				var dark =
					pref === 'dark' ||
					(pref === 'system' &&
						window.matchMedia('(prefers-color-scheme: dark)').matches);
				var root = document.documentElement;
				if (dark) root.classList.add('dark');
				root.style.colorScheme = dark ? 'dark' : 'light';
				root.style.backgroundColor = dark ? DARK_BG : LIGHT_BG;
				root.style.setProperty('--app-bg', dark ? DARK_BG : LIGHT_BG);
			})();
		</script>
		<meta name="color-scheme" content="light dark" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<link rel="icon" href="%sveltekit.assets%/logo.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" sizes="512x512" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#f8fafc" />
		<meta name="description" content="Antonsmash admin panel." />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="format-detection" content="telephone=no" />
		<script>
			window.__pwaDeferredPrompt = null;
			window.addEventListener('beforeinstallprompt', function (event) {
				event.preventDefault();
				window.__pwaDeferredPrompt = event;
				window.dispatchEvent(new Event('pwa-deferred-prompt'));
			});
			window.addEventListener('appinstalled', function () {
				window.__pwaDeferredPrompt = null;
				window.dispatchEvent(new Event('pwa-installed'));
			});
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
